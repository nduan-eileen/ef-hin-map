  grp.bindTooltip(label,{sticky:true,direction:"top",className:"rlabel",opacity:1});
  grp.bindPopup("<b>"+name+"</b><br>"+(osm&&osm!=name?"OSM: "+osm+"<br>":"")+(cat=="red"?"Screened high-crash road":"HIN / Action Plan road")+"<br>Start: "+start[0].toFixed(5)+", "+start[1].toFixed(5));
  grp.on("mouseover",function(){grp.setStyle({color:hi,weight:6});});grp.on("mouseout",function(){grp.setStyle({color:color,weight:4});});
  (cat=="red"?redLayer:orangeLayer).addLayer(grp);
  var sm=L.circleMarker(start,{radius:5,color:"#222",weight:1.5,fillColor:color,fillOpacity:1});sm.bindTooltip(label,{direction:"top",className:"rlabel",opacity:1});startLayer.addLayer(sm);
  features.push({name:name,osm:osm,cat:cat,group:grp,start:start,center:L.latLngBounds(flat).getCenter(),bounds:grp.getBounds()});
}
RED_DATA.forEach(function(r){addFeature(r.n,null,"red",r.s,r.st);});
ORANGE_DATA.forEach(function(o){addFeature(o.n,o.o,"orange",o.s,o.s[0][0]);});
var list=document.getElementById("list");
function section(title,cat){var arr=features.filter(function(f){return f.cat==cat;}).sort(function(a,b){return a.name.localeCompare(b.name);});
  var h=document.createElement("div");h.className="grp";h.textContent=title+" ("+arr.length+")";list.appendChild(h);
  arr.forEach(function(f){var d=document.createElement("div");d.className="item";d.dataset.name=f.name.toLowerCase();
    d.innerHTML='<span class="dot" style="background:'+(cat=="red"?RED:ORANGE)+'"></span>'+f.name+(f.osm&&f.osm!=f.name?'<div class="osm">OSM: '+f.osm+'</div>':'');
    d.onclick=function(){map.flyToBounds(f.bounds.pad(0.3),{maxZoom:15});setTimeout(function(){f.group.openPopup();},400);};
    list.appendChild(d);});}
section("Red — Screened (Demo pool)","red");section("Orange — HIN / Action Plan","orange");
var h2=document.createElement("div");h2.className="grp";h2.textContent="Unresolved (1)";list.appendChild(h2);
var d2=document.createElement("div");d2.className="item warn";d2.dataset.name="par rd";d2.innerHTML='<span class="dot" style="background:#ccc"></span>PAR RD<div class="osm">No parish-road number in audit — not plotted</div>';list.appendChild(d2);
function refreshLabels(){labelLayer.clearLayers();if(!document.getElementById("cLabels").checked)return;
  features.forEach(function(f){if(f.cat=="red"&&!document.getElementById("cRed").checked)return;if(f.cat=="orange"&&!document.getElementById("cOrange").checked)return;
    labelLayer.addLayer(L.tooltip({permanent:true,direction:"center",className:"rlabel",opacity:.95}).setLatLng(f.center).setContent(f.name));});}
document.getElementById("cRed").onchange=function(){this.checked?map.addLayer(redLayer):map.removeLayer(redLayer);refreshLabels();};
document.getElementById("cOrange").onchange=function(){this.checked?map.addLayer(orangeLayer):map.removeLayer(orangeLayer);refreshLabels();};
document.getElementById("cStart").onchange=function(){this.checked?map.addLayer(startLayer):map.removeLayer(startLayer);};
document.getElementById("cLabels").onchange=function(){this.checked?map.addLayer(labelLayer):map.removeLayer(labelLayer);refreshLabels();};
document.getElementById("search").oninput=function(){var q=this.value.toLowerCase();document.querySelectorAll("#list .item").forEach(function(it){it.style.display=it.dataset.name.indexOf(q)>=0?"":"none";});};
if(allPts.length)map.fitBounds(L.latLngBounds(allPts).pad(0.04));
document.getElementById("st").textContent="Ready · 23 red + 28 orange (embedded geometry)";
</script></body></html>
